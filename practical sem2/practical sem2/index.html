<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temperature Converter</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        background:#f4f4f4;
    }

    .container{
        background:white;
        padding:25px;
        border-radius:12px;
        box-shadow:0 0 10px rgba(0,0,0,0.2);
        width:90%;
        max-width:400px;
        text-align:center;
    }

    h2{
        margin-bottom:20px;
    }

    input, select, button{
        width:100%;
        padding:10px;
        margin:10px 0;
        border:1px solid #ccc;
        border-radius:5px;
    }

    button{
        background:#007BFF;
        color:white;
        border:none;
        cursor:pointer;
    }

    button:hover{
        background:#0056b3;
    }

    #result{
        margin-top:15px;
        font-size:20px;
        font-weight:bold;
    }

    @media(max-width:500px){
        .container{
            padding:15px;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h2>Temperature Converter</h2>

    <input type="number" id="temp" placeholder="Enter Temperature">

    <select id="conversion">
        <option value="CtoF">Celsius to Fahrenheit</option>
        <option value="FtoC">Fahrenheit to Celsius</option>
    </select>

    <button onclick="convertTemp()">Convert</button>

    <div id="result"></div>
</div>

<script>
function convertTemp() {

    let temp = parseFloat(document.getElementById("temp").value);
    let conversion = document.getElementById("conversion").value;
    let result;

    if(isNaN(temp)){
        document.getElementById("result").innerHTML =
        "Please enter a valid number";
        return;
    }

    if(conversion === "CtoF"){
        result = (temp * 9/5) + 32;
        document.getElementById("result").innerHTML =
        temp + " °C = " + result.toFixed(2) + " °F";
    }
    else{
        result = (temp - 32) * 5/9;
        document.getElementById("result").innerHTML =
        temp + " °F = " + result.toFixed(2) + " °C";
    }
}
</script>

</body>
</html>
